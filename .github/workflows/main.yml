name: Dungeon Slasher AI - Fetch Data

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and combine game data
        run: node index.js

      - name: Upload combined data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-data
          path: game-data.json
